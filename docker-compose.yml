services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contact_api_app
    volumes:
      - .:/var/www/html
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-contact_api}?serverVersion=16&charset=utf8
      # MAILER_DSN comes from env_file (.env / .env.local). Do not force Mailpit here.
    depends_on:
      postgres:
        condition: service_healthy
      mailer:
        condition: service_started
    networks:
      - contact_api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: contact_api_nginx
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - contact_api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: contact_api_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contact_api}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-contact_api}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - contact_api
    restart: unless-stopped

  mailer:
    image: axllent/mailpit
    container_name: contact_api_mailer
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - contact_api
    restart: unless-stopped

  composer:
    image: composer:2
    container_name: contact_api_composer
    working_dir: /app
    volumes:
      - .:/app
    environment:
      COMPOSER_ALLOW_SUPERUSER: 1
    entrypoint: ["composer"]
    profiles:
      - tools
    networks:
      - contact_api

volumes:
  postgres_data:

networks:
  contact_api:
    driver: bridge
