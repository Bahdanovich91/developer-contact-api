services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contact_api_app
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-app}@mysql:3306/${MYSQL_DATABASE:-contact_api}?serverVersion=8.4&charset=utf8mb4
      MAILER_DSN: ${MAILER_DSN:-smtp://mailer:1025}
    depends_on:
      mysql:
        condition: service_healthy
      mailer:
        condition: service_started
    networks:
      - contact_api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: contact_api_nginx
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - contact_api
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: contact_api_mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-contact_api}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - contact_api
    restart: unless-stopped

  mailer:
    image: axllent/mailpit
    container_name: contact_api_mailer
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - contact_api
    restart: unless-stopped

  composer:
    image: composer:2
    container_name: contact_api_composer
    working_dir: /app
    volumes:
      - .:/app
    environment:
      COMPOSER_ALLOW_SUPERUSER: 1
    entrypoint: ["composer"]
    profiles:
      - tools
    networks:
      - contact_api

volumes:
  mysql_data:

networks:
  contact_api:
    driver: bridge
